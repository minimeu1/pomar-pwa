<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomar App</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🍎 Registo Pomar</h1>

<div class="section">
  <button id="fruta-maca" class="fruta-btn" onclick="setFruta('maca')">🍎 Maçã</button>
  <button id="fruta-pera" class="fruta-btn" onclick="setFruta('pera')">🍐 Pêra</button>
</div>

<div class="section">
  <button id="zona-NORTE" class="zona-btn" onclick="setZona('NORTE')">Norte</button>
  <button id="zona-SUL" class="zona-btn" onclick="setZona('SUL')">Sul</button>
</div>

<div class="section">
  <input type="number" inputmode="numeric" id="linha" placeholder="Linha" />
</div>

<div class="section">
  <input type="text" id="obs" placeholder="Observações" />
</div>

<div class="section">
  <button onclick="registar()">✅ Registar</button>
  <button onclick="registarIgual()">🔁 Igual</button>
  <button onclick="apagarUltimo()">🗑️ Apagar</button>
</div>

<div class="section">
  <button onclick="exportCSV()">⬇ Exportar CSV</button>
  <button onclick="verUltimos()">📋 Últimos</button>
</div>

<script src="db.js"></script>
<script src="app.js"></script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js');
  });
}
</script>

</body>
</html>
